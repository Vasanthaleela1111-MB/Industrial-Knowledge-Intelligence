version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/industrialmind
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: industrialmind
      UPLOAD_FOLDER: /app/data/uploads
      PROCESSED_FOLDER: /app/data/processed
      STORAGE_FOLDER: /app/data/storage
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      MAX_KNOWLEDGE_CHUNKS: "25"
      USE_DOCLING: "false"
      DOCLING_TIMEOUT_SECONDS: "120"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      TOKENIZERS_PARALLELISM: "false"
    depends_on:
      - qdrant
      - neo4j
    volumes:
      - app_data:/app/data
      - ./backend:/app/backend
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.flask
    ports:
      - "5000:5000"
    environment:
      API_BASE_URL: http://api:8000
      PORT: "5000"
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-industrialmind-dev-secret}
    depends_on:
      - api
    volumes:
      - ./frontend:/app/frontend
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
  app_data: